# Render blueprint: API + workers + managed Postgres + Redis.
# (Railway users: the equivalent is three services + the Postgres/Redis plugins.)
services:
  - type: web
    name: sports-api
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile.api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: sports-db, property: connectionString }
      - key: REDIS_URL
        fromService: { name: sports-redis, type: redis, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: SPORTS_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: worker
    name: sports-workers
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile.workers
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: sports-db, property: connectionString }
      - key: REDIS_URL
        fromService: { name: sports-redis, type: redis, property: connectionString }
      - key: SPORTS_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

  - type: redis
    name: sports-redis
    ipAllowList: []
    plan: free

databases:
  - name: sports-db
    plan: free
