# Render blueprint: API + poller + notifier + managed Postgres + Redis.
# All three services share one Docker image (deploy/Dockerfile.backend) with
# different start commands.
services:
  - type: web
    name: sports-api
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile.backend
    dockerContext: .
    healthCheckPath: /health
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: sports-db, property: connectionString }
      - key: REDIS_URL
        fromService: { name: sports-redis, type: redis, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: SPORTS_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: worker
    name: sports-poller
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile.backend
    dockerContext: .
    dockerCommand: python -m app.workers.poller
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: sports-db, property: connectionString }
      - key: REDIS_URL
        fromService: { name: sports-redis, type: redis, property: connectionString }
      - key: SPORTS_API_KEY
        sync: false

  - type: worker
    name: sports-notifier
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile.backend
    dockerContext: .
    dockerCommand: arq app.workers.notifier.WorkerSettings
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: sports-db, property: connectionString }
      - key: REDIS_URL
        fromService: { name: sports-redis, type: redis, property: connectionString }
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

  - type: redis
    name: sports-redis
    ipAllowList: []
    plan: free

databases:
  - name: sports-db
    plan: free
