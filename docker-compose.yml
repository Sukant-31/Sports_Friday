# Local dev dependencies only (Postgres + Redis).
# App services run on the host (uvicorn / arq / vite) for a fast reload loop.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sports
      POSTGRES_PASSWORD: sports
      POSTGRES_DB: sports
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sports"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
